name: CI

# Триггеры: на push в любую ветку и на любой PR
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    # Переменные окружения для всех шагов job.
    # В CI .env-файла нет - настройки приложения читаются отсюда.
    env:
      SECRET_KEY: ci-secret-not-for-prod
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      CELERY_BROKER_URL: memory://
      CELERY_RESULT_BACKEND: cache+memory://
      CRYPTO_PROVIDER: coingecko
      STORAGE: json

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --all-groups

      # --- Качество кода ---
      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format check)
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy .

      # --- Миграции ---
      # makemigrations --check падает, если есть изменения моделей,
      # для которых не сгенерированы миграции.
      - name: Check migrations
        run: uv run python manage.py makemigrations --check --dry-run

      # --- Тесты ---
      - name: Unit tests
        run: uv run pytest -m unit

      - name: Integration tests
        run: uv run pytest -m integration
