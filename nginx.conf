# Количество воркер-процессов nginx. auto = по числу ядер CPU.
worker_processes auto;

events {
    # Сколько одновременных соединений может держать каждый воркер
    worker_connections 1024;
}

http {
    # Подключаем таблицу соответствий "расширение файла → Content-Type"
    # (нужно чтобы браузер понимал, что .css это стиль, а .js — скрипт)
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Логи запросов и ошибок (stdout/stderr контейнера)
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # upstream — именованная группа бэкендов, на которые проксируем.
    # "web" — это имя сервиса в docker-compose, 8000 — порт gunicorn.
    upstream django {
        server web:8000;
    }

    server {
        # nginx слушает 80-й порт внутри контейнера (HTTP по умолчанию)
        listen 80;
        server_name _;  # _ = "любой hostname"

        # Максимальный размер тела запроса (на случай загрузки файлов в API)
        client_max_body_size 10M;

        # Раздача статики напрямую с диска, минуя Django.
        # alias говорит nginx: "если URL начинается с /static/,
        # ищи файл в /usr/share/nginx/html/static/"
        location /static/ {
            alias /usr/share/nginx/html/static/;
            # Кэшировать в браузере на 7 дней (статика меняется редко)
            expires 7d;
            access_log off;  # не засоряем логи запросами на favicon и т.п.
        }

        # Всё остальное — проксируем в Django через upstream "django"
        location / {
            proxy_pass http://django;

            # Передаём заголовки, чтобы Django видел реального клиента,
            # а не nginx (иначе ALLOWED_HOSTS, IP-логи, https-редиректы — всё сломано)
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
